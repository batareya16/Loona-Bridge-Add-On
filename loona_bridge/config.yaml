---
name: Loona Agora Bridge
version: "0.1.20"
slug: loona_bridge
description: >
  Playwright/Firefox bridge для видео Loona через Agora RTC (H.264 via built-in libavcodec).
  Читает /config/.loona/bridge-config.json и подключается по WebSocket к HA Core.
arch:
  - aarch64
  - amd64
startup: application
boot: manual_only
init: false
map:
  - type: homeassistant_config
    read_only: true
    path: /ha_config
options:
  fps: 10
  jpeg_quality: 0.65
schema:
  fps: int(5,30)?
  jpeg_quality: float(0.35,0.95)?
