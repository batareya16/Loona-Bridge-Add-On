---
name: Loona Agora Bridge
version: "0.1.92"
slug: loona_bridge
description: >
  Playwright/Firefox bridge для видео Loona через Agora RTC (H.264 via built-in libavcodec).
  Читает /config/.loona/bridge-config.json и подключается по WebSocket к HA Core.
arch:
  - aarch64
  - amd64
startup: application
boot: manual_only
init: false
map:
  - type: homeassistant_config
    read_only: true
    path: /ha_config
# No full_access, no privileged capabilities needed:
# • OpenH264 GMP (the original reason for full_access) is no longer used —
#   H265 is decoded by ffmpeg subprocess, not Firefox's codec pipeline.
# • Firefox headless (Playwright) does not require SYS_ADMIN unlike Chromium;
#   its content-process sandbox uses seccomp-bpf which works under standard
#   Docker security settings.
# If Firefox fails to launch with "Operation not permitted", add back:
#   privileged: [SYS_ADMIN]
# host_network: container shares Pi's network stack directly.
# Without this, Firefox inside Docker sees only the Docker bridge IP (172.17.x.x)
# and puts that as ICE candidate → Agora edge server cannot route to it → bytes=0.
# With host_network the real Pi IP appears in ICE candidates → stable WebRTC UDP.
host_network: true
# H265 hardware decode: /dev/video19 = rpi-hevc-dec (rpivid driver, confirmed present in HA OS).
# Without this mapping the container cannot open the device → hevc_v4l2m2m fails → software fallback.
devices:
  - /dev/video19
options:
  fps: 10
  jpeg_quality: 0.65
schema:
  fps: int(5,30)?
  jpeg_quality: float(0.35,0.95)?
