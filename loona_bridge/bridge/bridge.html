<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Loona Agora Bridge</title>
  <!-- SDKs: when running via puppeteer, bridge.js injects them via addScriptTag.
       When running in manual mode (HTTP server on localhost), the SDKs are
       served from /sdk/rtc.js and /sdk/rtm.js by the Python HTTP server.
       The script-tag check below makes both paths work. -->
  <script>
    // If we have a config in the URL hash, we're in manual mode and need to
    // load the SDKs ourselves before startAgora can be called.
    if (location.hash && location.hash.startsWith('#cfg=')) {
      // Note: scripts loaded synchronously via document.write so they finish
      // before the inline <script> below runs.
      document.write('<script src="/sdk/rtc.js"><\/script>');
      document.write('<script src="/sdk/rtm.js"><\/script>');
    }
  </script>
  <!-- broadway.js: Emscripten H264 decoder (exposes window.Decoder).
       Fetches avc.wasm asynchronously from the same HTTP origin.
       bridge.js keeps the HTTP server alive (no httpServer.close()) so this
       fetch always succeeds regardless of when it fires relative to page load. -->
  <script src="/broadway.js"></script>
  <script>
    // ── SDP patch: inject sps-pps-idr-in-keyframe ─────────────────────────
    // Loona robot advertises {profile-level-id:42001f; sps-pps-idr-in-keyframe:1}
    // in its SDP. Open-source Chromium answers WITHOUT this param, so the robot
    // does NOT embed SPS+PPS NAL units in IDR frames → decoder never initialises
    // → video plays briefly then stalls ("playing → waiting", raw.decoded=0).
    // Patching RTCPeerConnection.setLocalDescription to re-add the param forces
    // the robot to include SPS/PPS in every keyframe, fixing decode failures
    // after PLI/NACK-triggered keyframe re-requests.
    (function patchRtcSdpForH264() {
      // WHY THIS PATCH EXISTS
      // ─────────────────────
      // The Loona robot's H.264 encoder will only embed SPS+PPS NAL units inside
      // every IDR frame (required by OpenH264 GMP decoder to initialise) if the
      // remote peer (us) includes sps-pps-idr-in-keyframe=1 in the answer fmtp.
      // Without this, the decoder receives IDR frames without SPS/PPS → cannot
      // parse the bitstream → framesDecoded stays 0 forever even though
      // bytesReceived grows (RTP arrives but codec pipeline is broken).
      //
      // HOW WE INJECT THE PARAM
      // ───────────────────────
      // setLocalDescription patch: handles the traditional form
      //   setLocalDescription({ type, sdp })
      // createAnswer patch: handles the modern implicit form used by Agora v4+
      //   answer = await createAnswer()   →   setLocalDescription(answer)
      //   or even:  setLocalDescription()   (no-arg, browser auto-creates answer)
      // By patching createAnswer() we catch the SDP before Agora/browser applies it.

      // role: 'answer' (local SDP we send to robot) or 'remote' (robot's offer, read-only).
      // For answer SDPs: downgrade High Profile H.264 to Constrained Baseline.
      // OpenH264 GMP supports Baseline + Main, NOT High Profile (0x64+).
      // Agora SDK often injects High-Profile PTs into the answer SDP; the robot
      // picks the first PT it sees, sends High-Profile stream, GMP can't decode → dec=0.
      const _fmtpLogged = {};  // log each PT's full fmtp once per session
      function injectSpsParam(sdpStr, role) {
        const isAnswer = (role === 'answer');
        // 'local' role: profile downgrade + packetization-mode=1 only; no sps-pps injection.
        // wrapSetDesc strips sps-pps-idr-in-keyframe before passing local SDP to Firefox,
        // but keeps packetization-mode=1 so depacketizer is correctly set to FU-A mode.
        const doProfileDown = (role === 'answer' || role === 'local');
        const doPM1        = (role === 'answer' || role === 'local');
        return sdpStr.replace(
          /^(a=fmtp:(\d+) [^\r\n]*profile-level-id=([0-9a-fA-F]{6})[^\r\n]*)$/mg,
          (line, _, pt, plid) => {
            const profileIdc = parseInt(plid.slice(0, 2), 16);
            const pname = profileIdc === 0x42 ? 'CBP' :
                          profileIdc === 0x4d ? 'Main' :
                          profileIdc === 0x64 ? 'High' :
                          profileIdc >= 0x64  ? 'HP+' : 'p0x' + plid.slice(0,2);
            let result = line;
            // Log full fmtp params once per PT.
            if (isAnswer && !_fmtpLogged[pt]) {
              _fmtpLogged[pt] = true;
              const fmtpParams = line.replace(/^a=fmtp:\d+ /, '');
              console.log('[sdp-fmtp] answer PT=' + pt + ' ' + fmtpParams);
            }
            // Downgrade High Profile → Constrained Baseline.
            if (doProfileDown && profileIdc >= 0x64) {
              result = result.replace(plid, '42e01f');
              console.log('[sdp-patch] PT=' + pt + ' ' + pname + '(' + plid + ') → CBP(42e01f) [role=' + role + ']');
            }
            // Force packetization-mode=1 (FU-A) on ALL H264 PTs in answer/local SDP.
            // Root cause of framesReceived=0: Agora edge forwards the robot's stream
            // using PT=97, whose SDP fmtp declares packetization-mode=0 (single-NAL).
            // The actual RTP payload uses FU-A fragmentation (mode=1).
            // Firefox initialises the depacketizer per fmtp → mode=0 → can't parse FU-A
            // → jitterBufferEmittedCount=0 forever.
            // Adding packetization-mode=1 here tells Firefox to use the FU-A depacketizer.
            if (doPM1 && !result.includes('packetization-mode=1')) {
              result += ';packetization-mode=1';
              console.log('[sdp-patch] PT=' + pt + ' +packetization-mode=1 (forced FU-A) [role=' + role + ']');
            }
            // Inject sps-pps-idr-in-keyframe=1 into ANSWER fmtp only (not local).
            // Required for Agora signaling: robot/edge won't send video without it.
            // wrapSetDesc strips it from setLocalDescription so Firefox depacketizer
            // doesn't change behaviour on this hint.
            if (isAnswer && !result.includes('sps-pps-idr-in-keyframe')) {
              result += ';sps-pps-idr-in-keyframe=1';
              console.log('[sdp-patch] PT=' + pt + ' +sps-pps-idr-in-keyframe (answer only)');
            }
            return result;
          }
        );
      }

      // ── PT=0 aliasing REMOVED (v0.1.61) ─────────────────────────────────────
      // PT=0 is a STATIC payload type (PCMU/8000) per RFC 3551.
      // RFC 4566 §6: for static PTs the a=rtpmap line is OPTIONAL and
      // implementations MAY ignore it.  Firefox does exactly this:
      // it treats PT=0 as PCMU/8000 regardless of our a=rtpmap:0 H264/90000
      // injection → Firefox sees an audio codec in the video m-section →
      // codec table resolution fails → getStats() returns no codec entries →
      // depacketizer never starts → jitter buffer stays empty forever.
      //
      // Evidence: "[stats-codec] no codec entries in getStats()" with
      //   "[xform] xform-event fired" but zero "[xform] frame#N" entries:
      //   the RTCRtpScriptTransform pipeline started but its readable is empty —
      //   consistent with zero packets being depacketized due to no codec.
      //
      // Fix: remove all addPt0AsH264 calls and the reAddAudioPcmu / localDescription
      // getter hack.  Let Firefox negotiate H264 on dynamic PTs (PT=126/PT=97)
      // as normal.  If edge truly sends H264 on PT=0, we'll see bytes>0 on the
      // audio inbound-rtp entry and can handle it differently.

      // ── SSRC=40000 → video section mover ────────────────────────────────────
      // Firefox SSRC-first demux: when remote SDP declares a=ssrc:40000 in the
      // audio m-section (common when Agora edge mis-maps the video SSRC), ALL
      // packets with SSRC=40000 go to the audio receiver regardless of PT.
      // If no a=ssrc lines at all: Firefox falls back to PT=0=PCMU (RFC 3551
      // static table) → same result: video packets fed to audio pipeline.
      // Fix: strip a=ssrc:40000 from audio, inject into video.
      // Applied to remote offer only (setRemoteDescription).
      function fixSsrc40000(sdp) {
        const sep  = sdp.indexOf('\r\n') >= 0 ? '\r\n' : '\n';
        const lines = sdp.split(sep);
        // Collect a=ssrc:40000 lines found anywhere (any m-section)
        const ssrcLines = lines.filter(l => /^a=ssrc:40000\b/.test(l));
        if (ssrcLines.length > 0) {
          ssrcLines.forEach(l => console.log('[sdp-ssrc] found: ' + l));
        } else {
          console.log('[sdp-ssrc] no a=ssrc:40000 in remote offer — will inject cname');
        }
        // Build toInject: use found lines, or synthesize a cname entry
        const toInject = ssrcLines.length > 0
          ? ssrcLines
          : ['a=ssrc:40000 cname:loona-video'];
        const out = [];
        let inAud = false, inVid = false;
        for (const l of lines) {
          if (/^m=/.test(l)) { inAud = /^m=audio/.test(l); inVid = /^m=video/.test(l); }
          // Drop a=ssrc:40000 from everywhere (will re-add only to video)
          if (/^a=ssrc:40000\b/.test(l)) {
            console.log('[sdp-ssrc] removed from ' + (inAud ? 'audio' : inVid ? 'video' : '?') + ': ' + l.slice(0, 60));
            continue;
          }
          out.push(l);
        }
        // Find end of video section and splice in the ssrc lines
        let insertIdx = -1;
        inVid = false;
        for (let i = 0; i < out.length; i++) {
          if (/^m=/.test(out[i])) {
            if (inVid) { insertIdx = i; inVid = false; }
            if (/^m=video/.test(out[i])) inVid = true;
          }
        }
        if (inVid) {
          let last = out.length - 1;
          while (last >= 0 && out[last] === '') last--;
          insertIdx = last + 1;
        }
        if (insertIdx >= 0) {
          out.splice(insertIdx, 0, ...toInject);
          console.log('[sdp-ssrc] injected ' + toInject.length + ' a=ssrc:40000 line(s) into video section');
        } else {
          console.log('[sdp-ssrc] WARNING: no video section found — ssrc not injected');
        }
        return out.join(sep);
      }

      // ── PCMU localDescription getter REMOVED (v0.1.61) ──────────────────────
      // No longer needed: we no longer strip PT=0 from audio in setRemoteDescription,
      // so Agora edge always sees PCMU in the local answer without any getter trick.

      // Patch createAnswer() — ensures SDP is modified BEFORE setLocalDescription
      // sees it, regardless of whether setLocalDescription is called with or without args.
      const origCreateAnswer = RTCPeerConnection.prototype.createAnswer;
      RTCPeerConnection.prototype.createAnswer = async function(...args) {
        const answer = await origCreateAnswer.apply(this, args);
        if (answer && answer.sdp) {
          // Log full m=video + all fmtp lines BEFORE any patching, every renegotiation.
          const mvLine = answer.sdp.match(/m=video[^\r\n]+/);
          const fmtpLines = answer.sdp.match(/a=fmtp:\d+[^\r\n]+/g) || [];
          if (mvLine) console.log('[sdp-ca-raw] ' + mvLine[0]);
          fmtpLines.forEach(l => console.log('[sdp-ca-raw] ' + l));

          // Reset per-PT log guard so every renegotiation logs fmtp details.
          Object.keys(_fmtpLogged).forEach(k => delete _fmtpLogged[k]);

          // Profile downgrade + sps-pps-idr-in-keyframe injection only.
          // PT=0 aliasing removed (v0.1.61) — see comment above.
          const patched  = injectSpsParam(answer.sdp, 'answer');
          if (patched !== answer.sdp) {
            console.log('[sdp-patch] createAnswer: patched H.264 fmtp + PT=0 H264 alias in answer SDP');
            return new RTCSessionDescription({ type: answer.type, sdp: patched });
          } else {
            const hasH264 = /H264|h264/i.test(answer.sdp);
            console.log('[sdp-patch] createAnswer: H264=' + hasH264 +
              (hasH264 ? ' no patch needed' : ' (no H264 in answer)'));
          }
        }
        return answer;
      };

      // Patch setLocalDescription: strip sps-pps-idr-in-keyframe BEFORE Firefox sees it.
      // Firefox 128 H264 depacketizer malfunctions when this param is present in the
      // local SDP → jitterBufferEmittedCount=0, framesReceived=0 forever.
      // Robot gets the param via createAnswer signaling (Agora SDP exchange), so RTP
      // delivery is unaffected. Only Firefox's local decoder config needs it gone.
      function wrapSetDesc(proto, method) {
        const orig = proto[method];
        proto[method] = function(init) {
          const pc = this;
          if (init && init.sdp) {
            const hasH264 = /H264|h264/i.test(init.sdp);
            // Log what Agora actually passes — may differ from our createAnswer output
            // if Agora SDK rewrites the SDP between createAnswer and setLocalDescription.
            if (hasH264) {
              (init.sdp.match(/a=fmtp:\d+[^\r\n]+/g) || [])
                .forEach(l => console.log('[sdp-pre-patch] ' + l));
            }
            // Strip sps-pps-idr-in-keyframe — Firefox must not see this in local SDP.
            const stripped = init.sdp.replace(/;?sps-pps-idr-in-keyframe=[^\s;]*/g, '');
            const strippedIt = (stripped !== init.sdp);
            // PT=0 aliasing removed (v0.1.61) — no addPt0AsH264 here.
            // Profile downgrade only ('local' role — no sps-pps re-injection).
            const patched = injectSpsParam(stripped, 'local');
            console.log('[sdp-patch] ' + method + ': H264=' + hasH264 +
              (strippedIt ? ' stripped sps-pps-idr-in-keyframe' : '') +
              (patched !== stripped ? ' → PATCHED (profile downgrade/PT=0)' :
               (!strippedIt && hasH264) ? ' no patch needed' : ''));
            const p = (patched !== init.sdp)
              ? orig.call(this, { type: init.type, sdp: patched })
              : orig.apply(this, arguments);
            // Log local SDP + video receiver codec params after resolution.
            if (p && typeof p.then === 'function') {
              p.then(() => {
                try {
                  const ld = pc.localDescription;
                  if (ld && ld.sdp && /m=video/.test(ld.sdp)) {
                    const mv = ld.sdp.match(/m=video[^\r\n]+/);
                    if (mv) console.log('[sdp-local-final] ' + mv[0]);
                    (ld.sdp.match(/a=fmtp:\d+[^\r\n]+/g) || [])
                      .forEach(l => console.log('[sdp-local-final] ' + l));
                    const hasSps = /sps-pps-idr-in-keyframe/.test(ld.sdp);
                    console.log('[sdp-local-final] sps-pps-idr-in-keyframe present=' + hasSps);
                    // Log what codec PT Firefox actually configured for video receiver.
                    // Empty codecs list = Firefox has NO codec for this receiver → root cause.
                    pc.getReceivers()
                      .filter(r => r.track && r.track.kind === 'video')
                      .forEach(r => {
                        const codecs = (r.getParameters().codecs || []);
                        if (codecs.length === 0) {
                          console.log('[recv-params] video receiver: NO codecs configured!');
                        } else {
                          codecs.forEach(c => console.log('[recv-params] video pt=' + c.payloadType +
                            ' mime=' + c.mimeType + (c.sdpFmtpLine ? ' fmtp=' + c.sdpFmtpLine : '')));
                        }
                      });
                  }
                } catch(e) { console.log('[recv-params] error: ' + e.message); }
              }).catch(() => {});
            }
            return p;
          } else {
            console.log('[sdp-patch] ' + method + ': no-arg (implicit form)');
          }
          return orig.apply(this, arguments);
        };
      }
      wrapSetDesc(RTCPeerConnection.prototype, 'setLocalDescription');
      // setRemoteDescription: log robot's offer, strip sps-pps-idr-in-keyframe,
      // add PT=0 alias to video section, and fix SSRC demux routing.
      const origSetRemoteDesc = RTCPeerConnection.prototype.setRemoteDescription;
      RTCPeerConnection.prototype.setRemoteDescription = function(init) {
        if (init && init.sdp) {
          const mvLine = init.sdp.match(/m=video[^\r\n]+/);
          const fmtpLines = init.sdp.match(/a=fmtp:\d+[^\r\n]+/g) || [];
          if (mvLine) {
            console.log('[sdp-offer] ' + mvLine[0]);
            // Log ALL rtpmap lines (PT→codec mapping for both audio and video)
            (init.sdp.match(/a=rtpmap:\d+[^\r\n]+/g) || [])
              .forEach(l => console.log('[sdp-offer] ' + l));
          }
          fmtpLines.forEach(l => console.log('[sdp-offer] ' + l));
          // Log audio m-section (key: shows if a=ssrc:40000 is declared in audio)
          const sep0 = init.sdp.indexOf('\r\n') >= 0 ? '\r\n' : '\n';
          let inAud0 = false;
          for (const l of init.sdp.split(sep0)) {
            if (/^m=/.test(l)) inAud0 = /^m=audio/.test(l);
            if (inAud0) console.log('[sdp-offer-aud] ' + l);
          }
          // Extract sprop-parameter-sets (out-of-band SPS+PPS in SDP)
          // The robot may deliver SPS/PPS only via sprop-parameter-sets (never in-band)!
          // Format: a=fmtp:X ...;sprop-parameter-sets=<base64SPS>,<base64PPS>
          const spropM = init.sdp.match(/sprop-parameter-sets=([A-Za-z0-9+/=]+),?([A-Za-z0-9+/=]*)/);
          if (spropM) {
            window._spropSPS = spropM[1] || '';
            window._spropPPS = spropM[2] || '';
            console.log('[sdp-sprop] sprop-parameter-sets: SPS=' + window._spropSPS.slice(0,20) +
              '... PPS=' + window._spropPPS.slice(0,20) + '...');
          } else {
            window._spropSPS = null; window._spropPPS = null;
            console.log('[sdp-sprop] no sprop-parameter-sets in remote SDP');
          }
          // Strip sps-pps-idr-in-keyframe from robot's offer.
          const stripped = init.sdp.replace(/;?sps-pps-idr-in-keyframe=[^\s;]*/g, '');
          if (stripped !== init.sdp)
            console.log('[sdp-offer] stripped sps-pps-idr-in-keyframe from remote offer');
          // PT=0 aliasing removed (v0.1.61) — no addPt0AsH264 here.
          // Fix SSRC demux: ensure a=ssrc:40000 is in video section.
          const withSsrc = fixSsrc40000(stripped);
          if (withSsrc !== init.sdp) return origSetRemoteDesc.call(this, { type: init.type, sdp: withSsrc });
        }
        return origSetRemoteDesc.apply(this, arguments);
      };
      console.log('[sdp-patch] installed');
    })();
  </script>
  <style>
    body { margin: 0; background: #111; color: #ccc; font: 12px monospace; }
    #remote-container { width: 640px; height: 360px; background: #000;
                        display: flex; align-items: center; justify-content: center; }
    #remote-container video { width: 100% !important; height: 100% !important;
                              object-fit: contain !important; }
    #remote { display: none; }   /* fallback, only used if Agora .play() fails */
    #grab   { display: none; }
    #log    { padding: 4px; max-height: 60vh; overflow: auto;
              white-space: pre-wrap; word-break: break-all; font-size: 11px;
              border: 1px solid #333; }
  </style>
  <!-- encodedInsertableStreams patch REMOVED.
       That flag forces Chrome's encoded-transform pipeline which requires a
       registered H.264 decoder factory. Without the factory (all Chromium
       builds without proprietary FFmpeg) the entire receive pipeline stalls
       and framesReceived stays 0 forever — even though bytesReceived grows.
       Canvas capture only needs the standard decode pipeline, so the patch
       is not only unnecessary but actively harmful. -->
</head>
<body>
  <div id="remote-container"></div>
  <video id="remote" autoplay muted playsinline></video>
  <canvas id="grab"></canvas>
  <pre id="log"></pre>
  <script>
    const log = (m) => {
      const p = document.getElementById('log');
      // Append (much larger ring buffer than before so nothing useful gets cut)
      p.textContent = (p.textContent + '\n' + m).slice(-20000);
      // Auto-scroll to bottom
      p.scrollTop = p.scrollHeight;
      console.log(m);
    };

    /** Build the standard Loona binary packet:
     *    [LENGTH:int32 LE = 4+body.length] [COMMAND:int32 LE] [BODY:bytes]
     *  LENGTH includes the 4-byte COMMAND field (matches Android SendDataBean.parse()).
     *  Returns a Uint8Array.
     */
    const makePacket = (command, body /* Uint8Array | undefined */) => {
      body = body || new Uint8Array(0);
      const buf = new Uint8Array(8 + body.length);
      const view = new DataView(buf.buffer);
      view.setInt32(0, 4 + body.length, true); // LE length of (command + body)
      view.setInt32(4, command,         true); // LE command code
      buf.set(body, 8);
      return buf;
    };
    const int32LE = (n) => {
      const u = new Uint8Array(4);
      new DataView(u.buffer).setInt32(0, n, true);
      return u;
    };
    const concat = (...arrs) => {
      const total = arrs.reduce((a, b) => a + b.length, 0);
      const out = new Uint8Array(total);
      let off = 0;
      for (const a of arrs) { out.set(a, off); off += a.length; }
      return out;
    };

    /** Called from bridge.js (Playwright) after the page loads. */
    window.startAgora = async (cfg) => {
      // (0=DEBUG, 1=INFO, 2=WARNING, 3=ERROR, 4=NONE)
      try { AgoraRTC.setLogLevel(3); } catch (_) {}
      try { if (AgoraRTM.setLogLevel) AgoraRTM.setLogLevel(3); } catch (_) {}

      log('channel=' + (cfg.channel || '(stub)') + ' ws=' + cfg.ws_host + ':' + cfg.ws_port);

      // 1) Open WS to the Python receiver — bridge.js sets cfg.ws_port.
      // ws_host defaults to 127.0.0.1 (subprocess mode inside HA container) but
      // is overridden to the HA Core IP when running from the Terminal add-on.
      const wsHost = cfg.ws_host || '127.0.0.1';
      const wsUrl  = 'ws://' + wsHost + ':' + cfg.ws_port;

      // Use a mutable binding so tick() / stateInterval always see the live socket.
      // Auto-reconnect with persistent-failure detection:
      //   If ws was never successfully opened: retry forever (Python may be slow to start).
      //   If ws opened at least once (credentials received) but then fails N times in a
      //   row: Python likely restarted on a NEW port — signal [FATAL] so bridge.js exits
      //   and run.sh re-reads bridge-config.json with the updated ws_port.
      let ws;
      let _wsResolve;
      const wsFirstOpen = new Promise((res) => { _wsResolve = res; });
      let wsEverOpened        = false;
      let wsConsecutiveFails  = 0;
      const WS_MAX_FAILS      = 20;   // 20 × 3 s = 60 s after first open → exit + restart
      const WS_FIRST_TIMEOUT  = 30;   // 30 s without ever opening → stale/dead port → exit + restart
                                      // The WS server opens BEFORE wake_robot(), so a healthy
                                      // bridge connects in ~15 s (Firefox launch).  30 s is plenty.
      let wsNeverOpenedTimer  = setTimeout(() => {
        if (!wsEverOpened) {
          log('[FATAL] ws never connected in ' + WS_FIRST_TIMEOUT + ' s — ' +
              'bridge-config.json likely has a stale port (Python restarted). ' +
              'Requesting bridge restart to re-read config.');
        }
      }, WS_FIRST_TIMEOUT * 1000);

      function openWs() {
        ws = new WebSocket(wsUrl);
        ws.binaryType = 'arraybuffer';
        ws.onopen = () => {
          wsEverOpened       = true;
          wsConsecutiveFails = 0;
          clearTimeout(wsNeverOpenedTimer);
          log('ws open');
          if (_wsResolve) { _wsResolve(); _wsResolve = null; }
        };
        ws.onerror = () => {};
        ws.onclose = () => {
          if (wsEverOpened) {
            wsConsecutiveFails++;
            if (wsConsecutiveFails === 1) log('ws closed — retrying...');
            if (wsConsecutiveFails >= WS_MAX_FAILS) {
              log('[FATAL] ws unreachable for ' + (WS_MAX_FAILS * 3) + ' s — Python restarted?');
              return;
            }
          }
          setTimeout(openWs, 3000);
        };
      }
      openWs();
      await wsFirstOpen;

      // 1b) If bridge.py gave us a stub config (empty app_id), block here until
      //     Python sends {"type":"agora_config", ...} with real Agora credentials.
      //     This happens when the WS server starts before wake_robot() completes.
      if (!cfg.app_id) {
        log('stub config — waiting for Agora credentials from Python...');
        cfg = await new Promise((resolve) => {
          const onCfg = (ev) => {
            if (typeof ev.data !== 'string') return;
            try {
              const m = JSON.parse(ev.data);
              if (m && m.type === 'agora_config') {
                ws.removeEventListener('message', onCfg);
                resolve({...cfg, ...m});
              }
            } catch(e) {}
          };
          ws.addEventListener('message', onCfg);
        });
        log('Agora credentials received: channel=' + cfg.channel.slice(0,16));
      }

      // 2a) Wait for H.264 WebRTC codec — NO TIMEOUT, NO FALLBACK.
      // Starting Agora without H.264 is pointless: the SDP will contain only
      // audio codecs, framesRx stays 0 forever.  We block here indefinitely until
      // RTCPeerConnection.createOffer() returns an SDP with H264.
      //
      // Normal case (prewarm succeeded): returns on the very first poll (~0 s).
      // Fallback case (GMP downloading at runtime): polls every 2 s until ready.
      // If OpenH264 never becomes available (GMP broken), the bridge stays here
      // forever — which is correct: no video is better than a running Agora client
      // that silently delivers nothing.
      await (async function waitForH264Codec() {
        const POLL_MS = 2000;
        let attempt = 0;
        while (true) {
          let hasH264 = false;
          try {
            const pc = new RTCPeerConnection();
            pc.addTransceiver('video', { direction: 'recvonly' });
            const offer = await pc.createOffer();
            hasH264 = /H264|h264/i.test(offer.sdp);
            pc.close();
          } catch (e) {
            log('[h264-wait] createOffer error: ' + e.message);
          }
          if (hasH264) {
            log('[h264-wait] ✓ H.264 ready' + (attempt ? ' (waited ' + Math.round(attempt*POLL_MS/1000) + 's)' : ''));
            return;
          }
          attempt++;
          // Log only every 15 attempts (~30 s) to avoid spam
          if (attempt === 1 || attempt % 15 === 0)
            log('[h264-wait] waiting for GMP... ' + Math.round(attempt*POLL_MS/1000) + 's');
          await new Promise(r => setTimeout(r, POLL_MS));
        }
      })();

      // 2b-pre) Probe actual H.264 decode capability via mediaCapabilities API.
      // This is a REAL decode test (not just SDP negotiation) — if supported=false,
      // the GMP is not functional even though H.264 appears in createOffer().
      try {
        const cap = await navigator.mediaCapabilities.decodingInfo({
          type: 'media-source',
          video: { contentType: 'video/mp4; codecs="avc1.42e01f"',
                   width: 1280, height: 720, bitrate: 2000000, framerate: 15 }
        });
        log('[h264-caps] supported=' + cap.supported + ' smooth=' + cap.smooth +
            ' powerEff=' + cap.powerEfficient);
      } catch (e) {
        log('[h264-caps] mediaCapabilities error: ' + e.message);
      }

      // 2c) Join the Agora RTC channel.
      // Match the robot's Android Agora SDK config: mode='live' + role='host'.
      // When clients in the same channel use different `mode` settings, Agora
      // silently breaks data delivery (control plane works, but no RTP bytes
      // arrive — receiveBitrate stays 0 forever). Robot is broadcaster in live
      // mode, so we go live+host too.
      const rtcMode  = cfg.rtc_mode || 'live';
      const rtcRole  = cfg.role     || 'host';
      const rtcCodec = cfg.codec || 'h264';
      const rtcClient = AgoraRTC.createClient({mode: rtcMode, codec: rtcCodec, role: rtcRole});
      log('[rtc-codec] using codec=' + rtcCodec + ' mode=' + rtcMode + ' role=' + rtcRole);

      // ── Agora connection diagnostics ─────────────────────────────────────────
      rtcClient.on('connection-state-change', (curState, prevState, reason) => {
        log('[rtc-state] ' + prevState + ' → ' + curState +
            (reason ? ' (' + reason + ')' : ''));
      });
      rtcClient.on('exception', (evt) => {
        log('[rtc-except] code=' + evt.code + ' msg=' + evt.msg +
            (evt.uid != null ? ' uid=' + evt.uid : ''));
      });
      rtcClient.on('network-quality', (stats) => {
        // Log only when quality degrades (0=unknown,1=excellent…6=dead)
        if (stats.downlinkNetworkQuality > 3 || stats.uplinkNetworkQuality > 3) {
          log('[rtc-quality] down=' + stats.downlinkNetworkQuality +
              ' up=' + stats.uplinkNetworkQuality);
        }
      });

      // Guard: Broadway pipeline is set up only once per video session.
      let broadwayActive = false;
      // Guard: video render + tick() + stats set up only once per video session.
      // Separate from broadwayActive because audio handler may set broadwayActive first,
      // which must not prevent the video render path from running.
      let videoSessionActive = false;

      // ── Shared canvas/frame state (audio path + video path) ──────────────────
      // Hoisted here so both user-published handlers (audio and video) can access them.
      const FPS         = cfg.fps || 15;
      const QUALITY     = cfg.jpeg_quality || 0.7;
      const minInterval = 1000 / FPS;
      const grabCanvas  = document.getElementById('grab');
      const grabCtx     = grabCanvas.getContext('2d');
      let capturedFrames = 0, firstFrameLogged = false, lastSendTs = 0;

      // ── PC finder — hoisted so it works from both audio and video paths ───────
      const isPC = (o) => o && typeof o === 'object' &&
        typeof o.getStats === 'function' && typeof o.getReceivers === 'function';
      function findPC(obj, d, wantVideo) {
        if (d > 7 || !obj || typeof obj !== 'object') return null;
        if (isPC(obj)) {
          if (!wantVideo) return obj;
          try {
            const hasLiveVideo = obj.getReceivers().some(
              r => r.track && r.track.kind === 'video' && r.track.readyState === 'live'
            );
            if (hasLiveVideo) return obj;
          } catch (_) {}
          return null;
        }
        try { for (const k of Object.keys(obj)) {
          try { const v = obj[k];
            if (v && typeof v === 'object' && !Array.isArray(v)) {
              const r = findPC(v, d + 1, wantVideo); if (r) return r; }
          } catch (_) {}
        }} catch (_) {}
        return null;
      }
      const findBestPC = (obj) => findPC(obj, 0, true) || findPC(obj, 0, false);

      // ── Broadway H264 software decoder ──────────────────────────────────────
      // Called from audio-published handler (primary: robot sends H264/PT=0 via
      // PCMU slot; skipping audio subscribe keeps routing to audio receiver)
      // and from video-published handler (fallback).
      // broadwayActive guard (set by callers) prevents double-install per session.
      function installBroadway() {
        (function attemptInstall(retries) {
          try {
            // Check PC first — Agora may need a moment to set up receivers
            const pc = findBestPC(rtcClient);
            if (!pc) {
              log('[broadway] no PC yet (attempt ' + (retries+1) + ')');
              if (retries < 12) setTimeout(() => attemptInstall(retries + 1), 1000);
              else log('[broadway] gave up waiting for PC');
              return;
            }
            const receivers = pc.getReceivers();
            if (receivers.length === 0) {
              log('[broadway] 0 receivers (attempt ' + (retries+1) + ')');
              if (retries < 12) setTimeout(() => attemptInstall(retries + 1), 1000);
              else log('[broadway] gave up waiting for receivers');
              return;
            }

            if (typeof Decoder === 'undefined') {
              log('[broadway] Decoder not available — broadway.js not loaded');
              return;
            }

            const bwDecoder = new Decoder({ rgb: true });
            let bwHasIDR = false, idrRetries = 0, totalPktCount = 0;

            bwDecoder.onDecoderReady = function() {
              log('[broadway] ✓ WASM decoder ready');
            };

            bwDecoder.onPictureDecoded = function(buffer, width, height) {
              if (grabCanvas.width  !== width)  grabCanvas.width  = width;
              if (grabCanvas.height !== height) grabCanvas.height = height;
              const imageData = grabCtx.createImageData(width, height);
              imageData.data.set(buffer);
              grabCtx.putImageData(imageData, 0, 0);
              capturedFrames++;
              if (!firstFrameLogged) {
                firstFrameLogged = true;
                log('[broadway] ✓ FIRST FRAME DECODED — ' + width + 'x' + height);
              }
              if (ws.readyState === 1) {
                const now = Date.now();
                if (now - lastSendTs >= minInterval) {
                  lastSendTs = now;
                  grabCanvas.toBlob((blob) => {
                    if (!blob) return;
                    blob.arrayBuffer().then((ab) => {
                      if (ws.readyState === 1) ws.send(ab);
                    });
                  }, 'image/jpeg', QUALITY);
                }
              }
            };

            // Pre-feed SPS+PPS from sprop-parameter-sets (set by setRemoteDescription patch)
            if (window._spropSPS) {
              try {
                const sps = Uint8Array.from(atob(window._spropSPS), c => c.charCodeAt(0));
                bwDecoder.decode(sps);
                log('[broadway] pre-fed SPS (' + sps.length + ' B)');
              } catch (e) { log('[broadway] SPS pre-feed err: ' + e.message); }
            }
            if (window._spropPPS) {
              try {
                const pps = Uint8Array.from(atob(window._spropPPS), c => c.charCodeAt(0));
                bwDecoder.decode(pps);
                log('[broadway] pre-fed PPS (' + pps.length + ' B)');
              } catch (e) { log('[broadway] PPS pre-feed err: ' + e.message); }
            }
            if (!window._spropSPS)
              log('[broadway] no sprop-parameter-sets — waiting for in-band SPS/PPS');

            // ── RTCRtpScriptTransform worker ─────────────────────────────────
            // Pipes frames through readable→writable (avoids back-pressure stall)
            // and posts each frame's encoded payload + metadata to main thread.
            // chunk.data is the encoded payload AFTER RTP depacketization — for
            // an audio receiver carrying PT=0/H264 this is the raw H264 payload
            // (FU-A fragment, STAP-A, or single NAL unit).
            const workerSrc = [
              'self.onrtctransform = function(ev) {',
              '  var tf = ev.transformer;',
              '  tf.readable.pipeThrough(new TransformStream({',
              '    transform: function(chunk, ctrl) {',
              '      try {',
              '        var m  = chunk.getMetadata ? chunk.getMetadata() : {};',
              '        var raw = chunk.data;',
              '        var u8 = new Uint8Array(raw instanceof ArrayBuffer ? raw.slice(0) : raw);',
              '        var nt  = u8.length > 0 ? (u8[0] & 0x1f) : -1;',
              '        var nt5 = u8.length > 0 ? ((u8[0] >> 1) & 0x3f) : -1;',
              '        var ft  = "P";',
              '        if (nt===5) ft="IDR";', // H264 single IDR NAL
              '        if (nt===28 && u8.length>1 && (u8[1]&0x80) && (u8[1]&0x1f)===5) ft="IDR";', // H264 FU-A IDR
              '        if (nt5===48) ft="IDR";', // H265 AP (contains VPS/SPS/PPS — key material)
              '        if (nt5===49 && u8.length>2 && (u8[2]&0x80) && ((u8[2]&0x1f)===19||(u8[2]&0x1f)===20)) ft="IDR";', // H265 FU IDR_W_RADL/IDR_N_LP
              '        self.postMessage({ data: u8, ts: chunk.timestamp||0, seq: m.sequenceNumber||0, ft: ft }, [u8.buffer]);',
              '      } catch(_) {}',
              '      ctrl.enqueue(chunk);',
              '    }',
              '  })).pipeTo(tf.writable).catch(function(){});',
              '};'
            ].join('\n');
            const workerBlob = new Blob([workerSrc], { type: 'application/javascript' });
            const workerUrl  = URL.createObjectURL(workerBlob);

            log('[broadway] found PC, receivers=' + receivers.length);

            // ── Per-receiver transform + FU-A reassembler ────────────────────
            // Each receiver gets its own worker and independent reassembler state
            // so fragments from audio and video receivers never get mixed.
            receivers.forEach((recv, idx) => {
              const kind = recv.track ? recv.track.kind : '?';
              log('[broadway] recv#' + idx + ' kind=' + kind +
                  (recv.track ? ' state=' + recv.track.readyState + ' muted=' + recv.track.muted : ''));

              // Per-receiver state
              let fuBuf = null, fuNalLocal = 0, recvPktCount = 0;

              function processPayload(payload) {
                recvPktCount++;
                totalPktCount++;
                const pktNum = totalPktCount;
                if (!payload || payload.length < 1) return;

                // ── H265 detection (RFC 7798) ────────────────────────────────
                // H265 nal_unit_type = (byte0 >> 1) & 0x3f
                // AP=48 (0x60): aggregation packet — carries VPS/SPS/PPS
                // FU=49 (0x62): fragmentation unit — carries large slices
                // Broadway.js is H264-only and cannot decode H265.
                // Firefox decodes H265 natively; canvas capture via tick() handles it.
                const nt265 = (payload[0] >> 1) & 0x3f;
                if (nt265 === 48) {
                  // H265 AP: treat as key material → stop IDR retry timer
                  bwHasIDR = true;
                  if (pktNum <= 10)
                    log('[broadway] recv#' + idx + ' pkt#' + pktNum +
                        ' H265-AP (VPS/SPS/PPS) ' + payload.length + 'B — Firefox native decode');
                  return;
                }
                if (nt265 === 49) {
                  // H265 FU: fur_type in byte2 bits[4:0]
                  if (payload.length < 3) return;
                  const fuHdr265  = payload[2];
                  const startBit  = (fuHdr265 & 0x80) !== 0;
                  const furType   = fuHdr265 & 0x1f;
                  const isIDR265  = (furType === 19 || furType === 20); // IDR_W_RADL / IDR_N_LP
                  if (isIDR265 && startBit) bwHasIDR = true;
                  if (pktNum <= 10 || pktNum % 300 === 0)
                    log('[broadway] recv#' + idx + ' pkt#' + pktNum +
                        ' H265-FU fur=' + furType + (isIDR265 ? '(IDR)' : '') +
                        ' start=' + startBit + ' ' + payload.length + 'B — Firefox native decode');
                  return;
                }

                // ── H264 parsing below ───────────────────────────────────────
                const naluType = payload[0] & 0x1f;

                if (naluType === 28) {
                  // FU-A fragmentation unit
                  const fuHdr    = payload[1];
                  const startBit = (fuHdr & 0x80) !== 0;
                  const endBit   = (fuHdr & 0x40) !== 0;
                  const innerNt  = fuHdr & 0x1f;
                  if (startBit) {
                    fuNalLocal = innerNt;
                    fuBuf = [new Uint8Array([(payload[0] & 0xe0) | innerNt]), payload.slice(2)];
                  } else if (fuBuf) {
                    fuBuf.push(payload.slice(2));
                  }
                  if (endBit && fuBuf) {
                    const totalLen = fuBuf.reduce((a, b) => a + b.length, 0);
                    const nal = new Uint8Array(totalLen);
                    let off = 0;
                    fuBuf.forEach(c => { nal.set(c, off); off += c.length; });
                    fuBuf = null;
                    if (fuNalLocal === 5) bwHasIDR = true;
                    if (!bwHasIDR) return;
                    if (pktNum <= 10 || pktNum % 300 === 0)
                      log('[broadway] recv#' + idx + ' pkt#' + pktNum + ' FU-A nal=' + fuNalLocal + ' ' + nal.length + 'B');
                    bwDecoder.decode(nal);
                  }
                } else if (naluType === 24) {
                  // STAP-A: multiple NAL units in one RTP packet
                  let off = 1;
                  while (off + 2 <= payload.length) {
                    const size = (payload[off] << 8) | payload[off + 1];
                    off += 2;
                    if (off + size > payload.length) break;
                    const nal = payload.slice(off, off + size);
                    off += size;
                    const nt = nal[0] & 0x1f;
                    if (nt === 7 || nt === 8) {         // SPS / PPS
                      bwDecoder.decode(nal);
                      log('[broadway] STAP-A nal=' + nt + ' (SPS/PPS) ' + size + 'B');
                    } else if (nt === 5) {               // IDR
                      bwHasIDR = true;
                      bwDecoder.decode(nal);
                    } else if (bwHasIDR) {               // P/B after IDR
                      bwDecoder.decode(nal);
                    }
                  }
                } else {
                  // Single NAL unit
                  const isIDR = (naluType === 5);
                  const isSPS = (naluType === 7);
                  const isPPS = (naluType === 8);
                  if (isIDR) bwHasIDR = true;
                  if (isSPS || isPPS || isIDR || bwHasIDR) {
                    if (pktNum <= 10 || pktNum % 300 === 0)
                      log('[broadway] recv#' + idx + ' pkt#' + pktNum + ' nal=' + naluType + ' ' + payload.length + 'B');
                    bwDecoder.decode(payload);
                  }
                }
              }

              if (typeof RTCRtpScriptTransform !== 'undefined') {
                try {
                  const worker = new Worker(workerUrl);
                  worker.onmessage = (e) => {
                    const { data, ft } = e.data;
                    // Hex dump first 10 packets for diagnosis
                    if (totalPktCount < 10) {
                      const hex = Array.from(data.slice(0, 8))
                        .map(b => b.toString(16).padStart(2, '0')).join(' ');
                      log('[broadway] recv#' + idx + ' len=' + data.length +
                          ' nal=' + (data.length ? (data[0] & 0x1f) : '?') +
                          ' type=' + ft + ' [' + hex + ']');
                    }
                    processPayload(data);
                  };
                  worker.onerror = (e) => log('[broadway] recv#' + idx + ' worker err: ' + e.message);
                  recv.transform = new RTCRtpScriptTransform(worker);
                  log('[broadway] recv#' + idx + ' RTCRtpScriptTransform installed');
                } catch (e) {
                  log('[broadway] recv#' + idx + ' transform err: ' + e.message);
                }
              } else {
                log('[broadway] RTCRtpScriptTransform unavailable — no software decode path');
              }
            });

            // ── IDR recovery timer ────────────────────────────────────────────
            // Polls every 5 s until first IDR arrives.
            // Uses requestKeyFrame() on all receivers + periodic RTM askVersion.
            const idrTimer = setInterval(() => {
              if (bwHasIDR) {
                clearInterval(idrTimer);
                log('[broadway] IDR arrived — recovery timer cleared');
                return;
              }
              idrRetries++;
              log('[broadway] no IDR yet (retry#' + idrRetries + ')');
              try {
                pc.getReceivers().forEach(r => {
                  try { if (r.requestKeyFrame) r.requestKeyFrame(); } catch(_) {}
                });
              } catch(_) {}
              if (idrRetries % 3 === 0 && window._rtmSendAskVer) {
                window._rtmSendAskVer().catch(() => {});
                log('[broadway] re-sent askVersion via RTM (IDR retry#' + idrRetries + ')');
              }
              if (idrRetries >= 30) {
                clearInterval(idrTimer);
                log('[broadway] IDR timeout after 30 retries — giving up');
              }
            }, 5000);

            log('[broadway] setup complete — installed on ' + receivers.length + ' receiver(s)');
          } catch (e) {
            log('[broadway] fatal setup error: ' + e.message);
          }
        })(0);
      }

      // Reset session guards when robot unpublishes so next user-published does full reinit.
      rtcClient.on('user-unpublished', (user, mediaType) => {
        log('[rtc] user-unpublished uid=' + user.uid + ' mediaType=' + mediaType);
        if (mediaType === 'video') {
          broadwayActive = false;
          videoSessionActive = false;
          log('[broadway] reset broadwayActive+videoSessionActive=false — will reinit on next user-published');
        }
      });

      rtcClient.on('user-published', async (user, mediaType) => {
        if (mediaType === 'audio') {
          // v0.1.67: Do NOT subscribe to audio — subscribing causes Agora to negotiate
          // OPUS and the robot stops sending H264/PT=0 on the audio receiver.
          // v0.1.73: When audio is NOT subscribed, the robot ONLY fires user-published
          // for audio (H264/PT=0 via PCMU slot). video user-published never fires.
          // We must install Broadway directly from this audio handler.
          log('[audio] skip subscription — needed to preserve H264/PT=0 routing to audio receiver');
          if (!broadwayActive) {
            broadwayActive = true;
            // 400 ms delay: let Agora finish SDP exchange and create PC receivers
            setTimeout(() => installBroadway(), 400);
          }
          return;
        }
        if (mediaType !== 'video') return;
        await rtcClient.subscribe(user, mediaType);
        log('subscribed uid=' + user.uid + ' ' + mediaType);
        // Re-send askVersion after subscription — robot may need this as a trigger
        // to continue publishing. First send happens during RTM init (before user-published).
        // Second send here ensures robot gets it after we've confirmed it's in the channel.
        if (window._rtmSendAskVer) {
          try { await window._rtmSendAskVer(); log('RTM askVersion re-sent after subscribe'); }
          catch(e) { log('[!] RTM askVersion re-send failed: ' + e.message); }
        }
        // broadwayActive may already be true if audio handler fired first and scheduled
        // installBroadway(). Track Broadway install separately from video render session
        // so tick()+stats always run on the FIRST video subscription regardless of order.
        const needBroadway = !broadwayActive;
        if (needBroadway) broadwayActive = true;

        if (videoSessionActive) {
          // True resubscribe: Broadway already installed, render already running.
          log('[video] resubscribed — Broadway already running, IDR expected');
          if (user.videoTrack) {
            try { await user.videoTrack.play(document.getElementById('remote-container')); } catch(_) {}
          }
          return;
        }
        videoSessionActive = true;

        const remoteTrack = user.videoTrack;

        // Let Agora render into our container div (video path only).
        const container = document.getElementById('remote-container');
        if (remoteTrack) {
          try {
            await remoteTrack.play(container);
            log('[video] remoteTrack.play() OK');
          } catch (e) {
            log('[video] remoteTrack.play() error: ' + e.message);
          }
        }

        // Install Broadway only if audio handler hasn't done so yet.
        // Primary decode is Firefox native H265/H264; Broadway is a software H264 fallback.
        if (needBroadway) installBroadway();

        // ── Frame-counter removed (v0.1.71): Broadway now installs on ALL receivers
        // and logs per-receiver info (recv#N meta, H264-pkt#N, hex-dump) directly.

        // Wait up to 10 s for Agora's <video> to have decoded dimensions.
        // No dimensions = H.264 not decoding (check chromium-codecs-ffmpeg-extra).
        let videoEl = null;
        for (let i = 0; i < 100; i++) {
          await new Promise(r => setTimeout(r, 100));
          const v = container.querySelector('video');
          if (v && v.videoWidth > 0 && v.videoHeight > 0) { videoEl = v; break; }
        }
        if (videoEl) {
          log('[video] ✓ <video> ready: ' + videoEl.videoWidth + 'x' + videoEl.videoHeight);
        } else {
          log('[video] ✗ no decoded video after 10 s — codec not decoding (H264/GMP or H265/VA-API?)');
          const v = container.querySelector('video');
          if (v) {
            const tracks = v.srcObject ? v.srcObject.getTracks() : [];
            const trk = tracks[0];
            const muted = trk ? trk.muted : 'n/a';
            log('[video-dbg] readyState=' + v.readyState +
                ' paused=' + v.paused +
                ' err=' + (v.error ? v.error.code : 'null') +
                ' srcObj=tracks=' + tracks.length +
                (trk ? (' trk.state=' + trk.readyState + ' trk.muted=' + muted) : ''));
            // If track is muted (robot not sending), just re-send askVersion via RTM.
            // Do NOT unsubscribe+subscribe — it breaks sessions and causes robot to disconnect.
            // The user-unpublished event will fire when robot truly stops, and will reset
            // broadwayActive=false so the next user-published does a full fresh reinit.
            if (muted === true) {
              log('[video] trk.muted → re-sending askVersion via RTM (no resubscribe)');
              setTimeout(async () => {
                try {
                  if (window._rtmSendAskVer) { await window._rtmSendAskVer(); log('RTM askVersion re-sent (muted)'); }
                } catch(e) { log('[!] muted askVersion failed: ' + e.message); }
              }, 2000);
            }
          } else {
            log('[video-dbg] no <video> in container');
          }
        }

        // ── Periodic stats ────────────────────────────────────────────────────
        let statsCount = 0;
        setInterval(async () => {
          statsCount++;
          let raw = {};
          try {
            const pc = findBestPC(rtcClient);
            if (pc) {
              // Log ICE/connection state on first stats interval for diagnosis
              if (statsCount === 1) {
                log('[pc-state] iceConnectionState=' + pc.iceConnectionState +
                    ' connectionState=' + pc.connectionState +
                    ' signalingState=' + pc.signalingState);
                const recv = pc.getReceivers();
                recv.forEach((r, i) => log('[pc-recv#' + i + '] kind=' + r.track.kind +
                    ' readyState=' + r.track.readyState + ' muted=' + r.track.muted));
              }
              const report = await pc.getStats();
              // Build codec map (id → {mimeType, payloadType})
              const codecMap = {};
              report.forEach((r) => { if (r.type === 'codec') codecMap[r.id] = r; });

              const videoRx = [];
              const allRx = [];
              report.forEach((r) => {
                if (r.type === 'inbound-rtp') {
                  allRx.push(r);
                  if (r.kind === 'video') {
                    videoRx.push(r);
                    raw = {bytes: r.bytesReceived, framesRx: r.framesReceived,
                           framesDec: r.framesDecoded, kf: r.keyFramesDecoded,
                           impl: r.decoderImplementation,
                           pkt: r.packetsReceived,
                           jbe: r.jitterBufferEmittedCount};
                  }
                }
              });

              // First interval: full dump + codec map + codecId diagnostic
              if (statsCount === 1) {
                // Log ALL codec entries so we can see what PT Firefox negotiated
                const codecEntries = Object.values(codecMap);
                if (codecEntries.length) {
                  codecEntries.forEach(c => log('[stats-codec] id=' + c.id +
                    ' mime=' + c.mimeType + ' pt=' + c.payloadType +
                    (c.sdpFmtpLine ? ' fmtp=' + c.sdpFmtpLine : '')));
                } else {
                  log('[stats-codec] no codec entries in getStats()');
                }

                videoRx.forEach((r, i) => {
                  const codec = r.codecId && codecMap[r.codecId];
                  const numVals = Object.entries(r)
                    .filter(([,v]) => typeof v === 'number')
                    .map(([k,v]) => k + '=' + v).join(' ');
                  const strVals = Object.entries(r)
                    .filter(([k,v]) => typeof v === 'string' && k !== 'id' && k !== 'type')
                    .map(([k,v]) => k + '=' + v).join(' ');
                  log('[stats-dbg#' + i + '] ssrc=' + r.ssrc +
                    ' codecId=' + (r.codecId || 'NONE') +
                    (codec ? ' → ' + codec.mimeType + '/pt=' + codec.payloadType : ' → NO MATCH') +
                    ' | ' + numVals);
                  if (strVals) log('[stats-dbg#' + i + '-str] ' + strVals);
                });
                if (videoRx.length === 0) log('[stats-dbg] no inbound-rtp video entries in getStats()');
              // Log non-video inbound-rtp entries (may reveal video on unexpected kind)
              allRx.filter(r => r.kind !== 'video').forEach(r => {
                const codec = r.codecId && codecMap[r.codecId];
                log('[stats-other-rx] ssrc=' + r.ssrc + ' kind=' + r.kind +
                  ' codecId=' + (r.codecId || 'NONE') +
                  (codec ? ' → ' + codec.mimeType + '/pt=' + codec.payloadType : '') +
                  ' pkt=' + r.packetsReceived + ' bytes=' + r.bytesReceived);
              });
              // v0.1.61: always log ALL inbound-rtp entries (every stats interval)
              // so we can see which SSRC/PT edge is actually using.
              if (allRx.length === 0) {
                log('[stats-all-rx] no inbound-rtp entries at all — packets not arriving?');
              } else {
                allRx.forEach(r => {
                  const codec = r.codecId && codecMap[r.codecId];
                  log('[stats-all-rx] ssrc=' + r.ssrc + ' kind=' + r.kind +
                    ' pt=' + (codec ? codec.payloadType : 'NONE') +
                    ' mime=' + (codec ? codec.mimeType : 'NONE') +
                    ' bytes=' + r.bytesReceived + ' pkt=' + r.packetsReceived +
                    ' rx=' + (r.framesReceived != null ? r.framesReceived : '?') +
                    ' dec=' + (r.framesDecoded != null ? r.framesDecoded : '?'));
                });
              }
              }

              // Log all video streams (there may be >1 SSRC)
              videoRx.forEach((r) => {
                const codec = r.codecId && codecMap[r.codecId];
                log('[stats-rx] ssrc=' + r.ssrc +
                  (codec ? ' ' + codec.mimeType + '/pt=' + codec.payloadType : '') +
                  ' bytes=' + r.bytesReceived + ' pkt=' + r.packetsReceived +
                  ' rx=' + (r.framesReceived != null ? r.framesReceived : '?') +
                  ' jbe=' + (r.jitterBufferEmittedCount != null ? r.jitterBufferEmittedCount : '?') +
                  ' dec=' + (r.framesDecoded != null ? r.framesDecoded : '?') +
                  ' kf=' + (r.keyFramesDecoded || 0) +
                  (r.decoderImplementation ? ' impl=' + r.decoderImplementation : ''));
              });
            }
          } catch (_) {}
          log('[stats] cap=' + capturedFrames +
              ' bytes=' + (raw.bytes || 0) +
              ' pkt='   + (raw.pkt   || 0) +
              ' rx='    + (raw.framesRx  != null ? raw.framesRx  : '?') +
              ' jbe='   + (raw.jbe   != null ? raw.jbe   : '?') +
              ' dec='   + (raw.framesDec != null ? raw.framesDec : '?') +
              ' kf='    + (raw.kf || 0) +
              (raw.impl ? ' impl=' + raw.impl : ''));
        }, 15000);

        // ── Canvas capture loop ───────────────────────────────────────────────
        const tick = () => {
          if (!videoEl || videoEl.videoWidth === 0)
            videoEl = container.querySelector('video') || null;

          if (videoEl && videoEl.videoWidth > 0 && videoEl.videoHeight > 0) {
            const w = videoEl.videoWidth, h = videoEl.videoHeight;
            if (grabCanvas.width  !== w) grabCanvas.width  = w;
            if (grabCanvas.height !== h) grabCanvas.height = h;
            grabCtx.drawImage(videoEl, 0, 0);
            capturedFrames++;
            if (!firstFrameLogged) {
              firstFrameLogged = true;
              log('[video] ✓ FIRST CAPTURE — ' + w + 'x' + h);
            }
            if (ws.readyState === 1) {
              const now = Date.now();
              if (now - lastSendTs >= minInterval) {
                lastSendTs = now;
                grabCanvas.toBlob((blob) => {
                  if (!blob) return;
                  blob.arrayBuffer().then((buf) => {
                    if (ws.readyState === 1) ws.send(buf);
                  });
                }, 'image/jpeg', QUALITY);
              }
            }
          }
          setTimeout(tick, minInterval);
        };
        tick();
      });

      rtcClient.on('user-unpublished', (user, mediaType) => {
        log('user-unpublished uid=' + user.uid + ' ' + mediaType);
      });
      rtcClient.on('user-left', (user, reason) => log('user-left uid=' + user.uid + ' ' + reason));
      // v0.1.64: log track-muted events to diagnose trk.muted=true
      rtcClient.on('user-info-updated', (uid, msg) => log('[rtc-info] uid=' + uid + ' ' + msg));
      try {
        rtcClient.on('media-reconnect-start', (uid) => log('[rtc-reconnect] start uid=' + uid));
        rtcClient.on('media-reconnect-end',   (uid) => log('[rtc-reconnect] end uid=' + uid));
      } catch(_) {}

      const rtcUid = await rtcClient.join(
        cfg.app_id, cfg.channel, cfg.token,
        cfg.user_id ? parseInt(cfg.user_id, 10) : null
      );
      log('RTC joined channel=' + cfg.channel + ' as uid=' + rtcUid);

      // 3) Login to Agora RTM and send the trigger packet to the robot.
      //
      // Without this, the robot stays silent in the channel — it waits for the
      // app to "say hello" via RTM peer message. The production app sends
      // CMD_CONTROL=100900 with subcmd=500 ("ask version") on kvsLoadSuccess
      // (ControlRemoteNewActivity.kvsLoadSuccess → sendAskVersionCommand →
      //  CommDataFactory.sendControlCommandRemote(500, ...)).  Sending the same
      // packet from here also makes the robot start publishing.
      if (!cfg.rtm_token || !cfg.rtm_uid_app || !cfg.rtm_uid_loona) {
        log('[!] RTM credentials missing — robot likely will not publish');
      } else {
        const rtmClient = AgoraRTM.createInstance(cfg.app_id);
        rtmClient.on('ConnectionStateChanged', (state, reason) => {
          if (state === 'DISCONNECTED' || state === 'ABORTED')
            log('RTM ' + state + ' reason=' + reason);
        });

        rtmClient.on('MessageFromPeer', (msg, peerId) => {
          const raw = msg && msg.rawMessage;
          if (raw) {
            const u8 = raw instanceof Uint8Array ? raw : new Uint8Array(raw);
            // Robot sends [CMD:4LE][BODY:N] — NO length prefix (unlike app→robot which adds LENGTH).
            // Previous bug: reading at offset 4 (treating it as [LENGTH][CMD]) → wrong cmd logged.
            let cmd = -1, subcmd = -1;
            const dv = new DataView(u8.buffer, u8.byteOffset, u8.byteLength);
            if (u8.length >= 4) cmd = dv.getInt32(0, true);
            if (u8.length >= 8) subcmd = dv.getInt32(4, true);
            // cmd=404 = GAME_ERROR status; subcmd=40000=robot fell, subcmd=50000=robot stood up
            // cmd=100900 + subcmd=500 = askVersion response (version data follows at byte 8+)
            const label = (cmd === 404) ? ('status/body=' + subcmd) :
                          (cmd === 100900 && subcmd === 500) ? 'askVersion-response' : '';
            log('RTM<- cmd=' + cmd + (subcmd !== -1 ? ' sub=' + subcmd : '') + ' bytes=' + u8.length + (label ? ' [' + label + ']' : ''));
            if (ws.readyState === 1) {
              try {
                ws.send(JSON.stringify({type: 'rtm', peer: peerId, cmd, bytes: Array.from(u8)}));
              } catch (e) {}
            }
          }
        });

        try {
          await rtmClient.login({uid: cfg.rtm_uid_app, token: cfg.rtm_token});
          log('RTM logged in as ' + cfg.rtm_uid_app);
        } catch (e) {
          log('[!] RTM login failed: ' + (e && (e.message || JSON.stringify(e))));
          throw e;
        }

        const CMD_CONTROL  = 100900;
        const SUBCMD_ASKVER = 500;
        const askVer = makePacket(CMD_CONTROL, int32LE(SUBCMD_ASKVER));

        // Expose askVersion sender for re-use after subscription
        window._rtmSendAskVer = async () => {
          await rtmClient.sendMessageToPeer(
            { rawMessage: makePacket(CMD_CONTROL, int32LE(SUBCMD_ASKVER)), description: 'askVersion' },
            cfg.rtm_uid_loona
          );
        };

        try {
          await rtmClient.sendMessageToPeer(
            { rawMessage: askVer, description: 'askVersion' },
            cfg.rtm_uid_loona
          );
          log('RTM askVersion sent');
        } catch (e) {
          log('[!] RTM sendMessageToPeer failed: ' + (e && (e.message || JSON.stringify(e))));
        }

        // Stash for later (Python may want to send commands too via window.rtmSend()).
        window.rtmSend = async (cmdCode, bodyBytes) => {
          const pkt = makePacket(cmdCode, bodyBytes);
          await rtmClient.sendMessageToPeer({ rawMessage: pkt }, cfg.rtm_uid_loona);
        };
      }

      // Keep alive forever; bridge.js closes the browser on SIGTERM/SIGINT.
      return rtcUid;
    };

    // Manual-mode auto-start: if URL has #cfg=BASE64(JSON), parse and run.
    if (location.hash && location.hash.startsWith('#cfg=')) {
      try {
        const cfgJson = atob(decodeURIComponent(location.hash.slice('#cfg='.length)));
        const cfg     = JSON.parse(cfgJson);
        // Wait for SDKs (loaded by document.write above) to be ready.
        const waitSdks = () => new Promise((resolve, reject) => {
          let tries = 0;
          const t = setInterval(() => {
            if (typeof AgoraRTC !== 'undefined' && typeof AgoraRTM !== 'undefined') {
              clearInterval(t); resolve();
            } else if (++tries > 40) {
              clearInterval(t); reject(new Error('SDKs did not load in time'));
            }
          }, 100);
        });
        waitSdks()
          .then(() => window.startAgora(cfg))
          .catch(err => log('[!] manual-start error: ' + err.message));
      } catch (e) {
        document.body.insertAdjacentHTML('beforeend',
          '<pre style="color:#f55">cfg parse error: ' + e.message + '</pre>');
      }
    }
  </script>
</body>
</html>
