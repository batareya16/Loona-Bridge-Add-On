<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Loona Agora Bridge</title>
  <!-- SDKs: when running via puppeteer, bridge.js injects them via addScriptTag.
       When running in manual mode (HTTP server on localhost), the SDKs are
       served from /sdk/rtc.js and /sdk/rtm.js by the Python HTTP server.
       The script-tag check below makes both paths work. -->
  <script>
    // If we have a config in the URL hash, we're in manual mode and need to
    // load the SDKs ourselves before startAgora can be called.
    if (location.hash && location.hash.startsWith('#cfg=')) {
      // Note: scripts loaded synchronously via document.write so they finish
      // before the inline <script> below runs.
      document.write('<script src="/sdk/rtc.js"><\/script>');
      document.write('<script src="/sdk/rtm.js"><\/script>');
    }
  </script>
  <script>
    // ── SDP patch: inject sps-pps-idr-in-keyframe=1 ─────────────────────────
    // Loona robot advertises {profile-level-id:42001f; sps-pps-idr-in-keyframe:1}
    // in its SDP. Open-source Chromium answers WITHOUT this param, so the robot
    // does NOT embed SPS+PPS NAL units in IDR frames → decoder never initialises
    // → video plays briefly then stalls ("playing → waiting", raw.decoded=0).
    // Patching RTCPeerConnection.setLocalDescription to re-add the param forces
    // the robot to include SPS/PPS in every keyframe, fixing decode failures
    // after PLI/NACK-triggered keyframe re-requests.
    (function patchRtcSdpForH264() {
      // WHY THIS PATCH EXISTS
      // ─────────────────────
      // The Loona robot's H.264 encoder will only embed SPS+PPS NAL units inside
      // every IDR frame (required by OpenH264 GMP decoder to initialise) if the
      // remote peer (us) includes sps-pps-idr-in-keyframe=1 in the answer fmtp.
      // Without this, the decoder receives IDR frames without SPS/PPS → cannot
      // parse the bitstream → framesDecoded stays 0 forever even though
      // bytesReceived grows (RTP arrives but codec pipeline is broken).
      //
      // HOW WE INJECT THE PARAM
      // ───────────────────────
      // setLocalDescription patch: handles the traditional form
      //   setLocalDescription({ type, sdp })
      // createAnswer patch: handles the modern implicit form used by Agora v4+
      //   answer = await createAnswer()   →   setLocalDescription(answer)
      //   or even:  setLocalDescription()   (no-arg, browser auto-creates answer)
      // By patching createAnswer() we catch the SDP before Agora/browser applies it.

      // role: 'answer' (local SDP we send to robot) or 'remote' (robot's offer, read-only).
      // For answer SDPs: downgrade High Profile H.264 to Constrained Baseline.
      // OpenH264 GMP supports Baseline + Main, NOT High Profile (0x64+).
      // Agora SDK often injects High-Profile PTs into the answer SDP; the robot
      // picks the first PT it sees, sends High-Profile stream, GMP can't decode → dec=0.
      const _fmtpLogged = {};  // log each PT's full fmtp once per session
      function injectSpsParam(sdpStr, role) {
        const isAnswer = (role === 'answer');
        // 'local' role: profile downgrade only, NO sps-pps-idr-in-keyframe injection.
        // Used by wrapSetDesc so Firefox's H264 depacketizer works without that
        // constraint (which causes framesReceived=0 / jitterBufferEmittedCount=0).
        // Robot still gets sps-pps-idr-in-keyframe via createAnswer signaling.
        const doProfileDown = (role === 'answer' || role === 'local');
        return sdpStr.replace(
          /^(a=fmtp:(\d+) [^\r\n]*profile-level-id=([0-9a-fA-F]{6})[^\r\n]*)$/mg,
          (line, _, pt, plid) => {
            const profileIdc = parseInt(plid.slice(0, 2), 16);
            const pname = profileIdc === 0x42 ? 'CBP' :
                          profileIdc === 0x4d ? 'Main' :
                          profileIdc === 0x64 ? 'High' :
                          profileIdc >= 0x64  ? 'HP+' : 'p0x' + plid.slice(0,2);
            let result = line;
            // Log full fmtp params once per PT so we can see packetization-mode etc.
            if (isAnswer && !_fmtpLogged[pt]) {
              _fmtpLogged[pt] = true;
              const fmtpParams = line.replace(/^a=fmtp:\d+ /, '');
              console.log('[sdp-fmtp] answer PT=' + pt + ' ' + fmtpParams);
            }
            // Downgrade High Profile → Constrained Baseline for answer and local SDP.
            if (doProfileDown && profileIdc >= 0x64) {
              result = result.replace(plid, '42e01f');
              console.log('[sdp-patch] PT=' + pt + ' ' + pname + '(' + plid + ') → CBP(42e01f) [role=' + role + ']');
            }
            // Inject sps-pps-idr-in-keyframe=1 into H264 ANSWER fmtp ONLY.
            // REQUIRED in answer: without this Agora edge mutes video track entirely.
            // NOT injected for 'local' role: Firefox's H264 depacketizer malfunctions
            // when this param is present in setLocalDescription SDP → framesReceived=0.
            if (isAnswer && !result.includes('sps-pps-idr-in-keyframe')) {
              result += ';sps-pps-idr-in-keyframe=1';
              console.log('[sdp-patch] PT=' + pt + ' +sps-pps-idr-in-keyframe (answer only)');
            }
            return result;
          }
        );
      }

      // Patch createAnswer() — ensures SDP is modified BEFORE setLocalDescription
      // sees it, regardless of whether setLocalDescription is called with or without args.
      const origCreateAnswer = RTCPeerConnection.prototype.createAnswer;
      RTCPeerConnection.prototype.createAnswer = async function(...args) {
        const answer = await origCreateAnswer.apply(this, args);
        if (answer && answer.sdp) {
          // Log full m=video + all fmtp lines BEFORE any patching, every renegotiation.
          // Helps diagnose: missing packetization-mode=1, wrong profile, etc.
          const mvLine = answer.sdp.match(/m=video[^\r\n]+/);
          const fmtpLines = answer.sdp.match(/a=fmtp:\d+[^\r\n]+/g) || [];
          if (mvLine) console.log('[sdp-ca-raw] ' + mvLine[0]);
          fmtpLines.forEach(l => console.log('[sdp-ca-raw] ' + l));

          // Reset per-PT log guard so every renegotiation logs fmtp details.
          Object.keys(_fmtpLogged).forEach(k => delete _fmtpLogged[k]);

          const patched = injectSpsParam(answer.sdp, 'answer');
          if (patched !== answer.sdp) {
            console.log('[sdp-patch] createAnswer: patched H.264 fmtp in answer SDP');
            return new RTCSessionDescription({ type: answer.type, sdp: patched });
          } else {
            const hasH264 = /H264|h264/i.test(answer.sdp);
            console.log('[sdp-patch] createAnswer: H264=' + hasH264 +
              (hasH264 ? ' no profile patch needed' : ' (no H264 in answer)'));
          }
        }
        return answer;
      };

      // Patch setLocalDescription: strip sps-pps-idr-in-keyframe BEFORE Firefox sees it.
      // Firefox 128 H264 depacketizer malfunctions when this param is present in the
      // local SDP → jitterBufferEmittedCount=0, framesReceived=0 forever.
      // Robot gets the param via createAnswer signaling (Agora SDP exchange), so RTP
      // delivery is unaffected. Only Firefox's local decoder config needs it gone.
      function wrapSetDesc(proto, method) {
        const orig = proto[method];
        proto[method] = function(init) {
          if (init && init.sdp) {
            const hasH264 = /H264|h264/i.test(init.sdp);
            // Strip sps-pps-idr-in-keyframe — Firefox must not see this in local SDP.
            const stripped = init.sdp.replace(/;sps-pps-idr-in-keyframe=\d/g, '');
            const strippedIt = (stripped !== init.sdp);
            // Profile downgrade only ('local' role — no sps-pps re-injection).
            const patched = injectSpsParam(stripped, 'local');
            console.log('[sdp-patch] ' + method + ': H264=' + hasH264 +
              (strippedIt ? ' stripped sps-pps-idr-in-keyframe' : '') +
              (patched !== stripped ? ' → PATCHED (profile downgrade)' :
               (!strippedIt && hasH264) ? ' no patch needed' : ''));
            if (patched !== init.sdp) {
              return orig.call(this, { type: init.type, sdp: patched });
            }
          } else {
            console.log('[sdp-patch] ' + method + ': called without sdp arg (implicit form — relying on createAnswer patch)');
          }
          return orig.apply(this, arguments);
        };
      }
      wrapSetDesc(RTCPeerConnection.prototype, 'setLocalDescription');
      // setRemoteDescription: log robot's offer m=video + fmtp (shows actual codec/profile/params).
      const origSetRemoteDesc = RTCPeerConnection.prototype.setRemoteDescription;
      RTCPeerConnection.prototype.setRemoteDescription = function(init) {
        if (init && init.sdp) {
          const mvLine = init.sdp.match(/m=video[^\r\n]+/);
          const fmtpLines = init.sdp.match(/a=fmtp:\d+[^\r\n]+/g) || [];
          if (mvLine) console.log('[sdp-offer] ' + mvLine[0]);
          fmtpLines.forEach(l => console.log('[sdp-offer] ' + l));
          const patched = injectSpsParam(init.sdp, 'remote');
          if (patched !== init.sdp) return origSetRemoteDesc.call(this, { type: init.type, sdp: patched });
        }
        return origSetRemoteDesc.apply(this, arguments);
      };
      console.log('[sdp-patch] installed');
    })();
  </script>
  <style>
    body { margin: 0; background: #111; color: #ccc; font: 12px monospace; }
    #remote-container { width: 640px; height: 360px; background: #000;
                        display: flex; align-items: center; justify-content: center; }
    #remote-container video { width: 100% !important; height: 100% !important;
                              object-fit: contain !important; }
    #remote { display: none; }   /* fallback, only used if Agora .play() fails */
    #grab   { display: none; }
    #log    { padding: 4px; max-height: 60vh; overflow: auto;
              white-space: pre-wrap; word-break: break-all; font-size: 11px;
              border: 1px solid #333; }
  </style>
  <!-- encodedInsertableStreams patch REMOVED.
       That flag forces Chrome's encoded-transform pipeline which requires a
       registered H.264 decoder factory. Without the factory (all Chromium
       builds without proprietary FFmpeg) the entire receive pipeline stalls
       and framesReceived stays 0 forever — even though bytesReceived grows.
       Canvas capture only needs the standard decode pipeline, so the patch
       is not only unnecessary but actively harmful. -->
</head>
<body>
  <div id="remote-container"></div>
  <video id="remote" autoplay muted playsinline></video>
  <canvas id="grab"></canvas>
  <pre id="log"></pre>
  <script>
    const log = (m) => {
      const p = document.getElementById('log');
      // Append (much larger ring buffer than before so nothing useful gets cut)
      p.textContent = (p.textContent + '\n' + m).slice(-20000);
      // Auto-scroll to bottom
      p.scrollTop = p.scrollHeight;
      console.log(m);
    };

    /** Build the standard Loona binary packet:
     *    [LENGTH:int32 LE = 4+body.length] [COMMAND:int32 LE] [BODY:bytes]
     *  LENGTH includes the 4-byte COMMAND field (matches Android SendDataBean.parse()).
     *  Returns a Uint8Array.
     */
    const makePacket = (command, body /* Uint8Array | undefined */) => {
      body = body || new Uint8Array(0);
      const buf = new Uint8Array(8 + body.length);
      const view = new DataView(buf.buffer);
      view.setInt32(0, 4 + body.length, true); // LE length of (command + body)
      view.setInt32(4, command,         true); // LE command code
      buf.set(body, 8);
      return buf;
    };
    const int32LE = (n) => {
      const u = new Uint8Array(4);
      new DataView(u.buffer).setInt32(0, n, true);
      return u;
    };
    const concat = (...arrs) => {
      const total = arrs.reduce((a, b) => a + b.length, 0);
      const out = new Uint8Array(total);
      let off = 0;
      for (const a of arrs) { out.set(a, off); off += a.length; }
      return out;
    };

    /** Called from bridge.js (Playwright) after the page loads. */
    window.startAgora = async (cfg) => {
      // (0=DEBUG, 1=INFO, 2=WARNING, 3=ERROR, 4=NONE)
      try { AgoraRTC.setLogLevel(3); } catch (_) {}
      try { if (AgoraRTM.setLogLevel) AgoraRTM.setLogLevel(3); } catch (_) {}

      log('channel=' + (cfg.channel || '(stub)') + ' ws=' + cfg.ws_host + ':' + cfg.ws_port);

      // 1) Open WS to the Python receiver — bridge.js sets cfg.ws_port.
      // ws_host defaults to 127.0.0.1 (subprocess mode inside HA container) but
      // is overridden to the HA Core IP when running from the Terminal add-on.
      const wsHost = cfg.ws_host || '127.0.0.1';
      const wsUrl  = 'ws://' + wsHost + ':' + cfg.ws_port;

      // Use a mutable binding so tick() / stateInterval always see the live socket.
      // Auto-reconnect with persistent-failure detection:
      //   If ws was never successfully opened: retry forever (Python may be slow to start).
      //   If ws opened at least once (credentials received) but then fails N times in a
      //   row: Python likely restarted on a NEW port — signal [FATAL] so bridge.js exits
      //   and run.sh re-reads bridge-config.json with the updated ws_port.
      let ws;
      let _wsResolve;
      const wsFirstOpen = new Promise((res) => { _wsResolve = res; });
      let wsEverOpened        = false;
      let wsConsecutiveFails  = 0;
      const WS_MAX_FAILS      = 20;   // 20 × 3 s = 60 s after first open → exit + restart
      const WS_FIRST_TIMEOUT  = 30;   // 30 s without ever opening → stale/dead port → exit + restart
                                      // The WS server opens BEFORE wake_robot(), so a healthy
                                      // bridge connects in ~15 s (Firefox launch).  30 s is plenty.
      let wsNeverOpenedTimer  = setTimeout(() => {
        if (!wsEverOpened) {
          log('[FATAL] ws never connected in ' + WS_FIRST_TIMEOUT + ' s — ' +
              'bridge-config.json likely has a stale port (Python restarted). ' +
              'Requesting bridge restart to re-read config.');
        }
      }, WS_FIRST_TIMEOUT * 1000);

      function openWs() {
        ws = new WebSocket(wsUrl);
        ws.binaryType = 'arraybuffer';
        ws.onopen = () => {
          wsEverOpened       = true;
          wsConsecutiveFails = 0;
          clearTimeout(wsNeverOpenedTimer);
          log('ws open');
          if (_wsResolve) { _wsResolve(); _wsResolve = null; }
        };
        ws.onerror = () => {};
        ws.onclose = () => {
          if (wsEverOpened) {
            wsConsecutiveFails++;
            if (wsConsecutiveFails === 1) log('ws closed — retrying...');
            if (wsConsecutiveFails >= WS_MAX_FAILS) {
              log('[FATAL] ws unreachable for ' + (WS_MAX_FAILS * 3) + ' s — Python restarted?');
              return;
            }
          }
          setTimeout(openWs, 3000);
        };
      }
      openWs();
      await wsFirstOpen;

      // 1b) If bridge.py gave us a stub config (empty app_id), block here until
      //     Python sends {"type":"agora_config", ...} with real Agora credentials.
      //     This happens when the WS server starts before wake_robot() completes.
      if (!cfg.app_id) {
        log('stub config — waiting for Agora credentials from Python...');
        cfg = await new Promise((resolve) => {
          const onCfg = (ev) => {
            if (typeof ev.data !== 'string') return;
            try {
              const m = JSON.parse(ev.data);
              if (m && m.type === 'agora_config') {
                ws.removeEventListener('message', onCfg);
                resolve({...cfg, ...m});
              }
            } catch(e) {}
          };
          ws.addEventListener('message', onCfg);
        });
        log('Agora credentials received: channel=' + cfg.channel.slice(0,16));
      }

      // 2a) Wait for H.264 WebRTC codec — NO TIMEOUT, NO FALLBACK.
      // Starting Agora without H.264 is pointless: the SDP will contain only
      // audio codecs, framesRx stays 0 forever.  We block here indefinitely until
      // RTCPeerConnection.createOffer() returns an SDP with H264.
      //
      // Normal case (prewarm succeeded): returns on the very first poll (~0 s).
      // Fallback case (GMP downloading at runtime): polls every 2 s until ready.
      // If OpenH264 never becomes available (GMP broken), the bridge stays here
      // forever — which is correct: no video is better than a running Agora client
      // that silently delivers nothing.
      await (async function waitForH264Codec() {
        const POLL_MS = 2000;
        let attempt = 0;
        while (true) {
          let hasH264 = false;
          try {
            const pc = new RTCPeerConnection();
            pc.addTransceiver('video', { direction: 'recvonly' });
            const offer = await pc.createOffer();
            hasH264 = /H264|h264/i.test(offer.sdp);
            pc.close();
          } catch (e) {
            log('[h264-wait] createOffer error: ' + e.message);
          }
          if (hasH264) {
            log('[h264-wait] ✓ H.264 ready' + (attempt ? ' (waited ' + Math.round(attempt*POLL_MS/1000) + 's)' : ''));
            return;
          }
          attempt++;
          // Log only every 15 attempts (~30 s) to avoid spam
          if (attempt === 1 || attempt % 15 === 0)
            log('[h264-wait] waiting for GMP... ' + Math.round(attempt*POLL_MS/1000) + 's');
          await new Promise(r => setTimeout(r, POLL_MS));
        }
      })();

      // 2b-pre) Probe actual H.264 decode capability via mediaCapabilities API.
      // This is a REAL decode test (not just SDP negotiation) — if supported=false,
      // the GMP is not functional even though H.264 appears in createOffer().
      try {
        const cap = await navigator.mediaCapabilities.decodingInfo({
          type: 'media-source',
          video: { contentType: 'video/mp4; codecs="avc1.42e01f"',
                   width: 1280, height: 720, bitrate: 2000000, framerate: 15 }
        });
        log('[h264-caps] supported=' + cap.supported + ' smooth=' + cap.smooth +
            ' powerEff=' + cap.powerEfficient);
      } catch (e) {
        log('[h264-caps] mediaCapabilities error: ' + e.message);
      }

      // 2c) Join the Agora RTC channel.
      // Match the robot's Android Agora SDK config: mode='live' + role='host'.
      // When clients in the same channel use different `mode` settings, Agora
      // silently breaks data delivery (control plane works, but no RTP bytes
      // arrive — receiveBitrate stays 0 forever). Robot is broadcaster in live
      // mode, so we go live+host too.
      const rtcMode  = cfg.rtc_mode || 'live';
      const rtcRole  = cfg.role     || 'host';
      const rtcCodec = cfg.codec || 'h264';
      const rtcClient = AgoraRTC.createClient({mode: rtcMode, codec: rtcCodec, role: rtcRole});
      log('[rtc-codec] using codec=' + rtcCodec + ' mode=' + rtcMode + ' role=' + rtcRole);

      // ── Agora connection diagnostics ─────────────────────────────────────────
      rtcClient.on('connection-state-change', (curState, prevState, reason) => {
        log('[rtc-state] ' + prevState + ' → ' + curState +
            (reason ? ' (' + reason + ')' : ''));
      });
      rtcClient.on('exception', (evt) => {
        log('[rtc-except] code=' + evt.code + ' msg=' + evt.msg +
            (evt.uid != null ? ' uid=' + evt.uid : ''));
      });
      rtcClient.on('network-quality', (stats) => {
        // Log only when quality degrades (0=unknown,1=excellent…6=dead)
        if (stats.downlinkNetworkQuality > 3 || stats.uplinkNetworkQuality > 3) {
          log('[rtc-quality] down=' + stats.downlinkNetworkQuality +
              ' up=' + stats.uplinkNetworkQuality);
        }
      });

      // Guard: Broadway pipeline is set up only once per video session.
      // The keyframe-forcer may trigger resubscribe → user-published fires again;
      // we must NOT create a second Decoder or open a second encoded stream.
      let broadwayActive = false;

      rtcClient.on('user-published', async (user, mediaType) => {
        if (mediaType === 'audio') {
          // Skip audio subscription intentionally.
          // Subscribing to audio causes Agora to call `new AudioContext()`.
          // In headless Firefox inside Docker (no audio device), the context
          // stays suspended → currentTime=0 → Agora warns "stuck at 0" and
          // freezes its video jitter-buffer scheduler → framesDecoded stays 0.
          // We only need video frames; audio is unused.
          // The AudioContext.prototype.currentTime synthetic-time patch in
          // bridge.js is a belt-and-suspenders fix if Agora creates a context
          // for any other reason.
          log('[audio] skip subscription (headless Docker — no audio device)');
          return;
        }
        if (mediaType !== 'video') return;
        await rtcClient.subscribe(user, mediaType);
        log('subscribed uid=' + user.uid + ' ' + mediaType);
        if (broadwayActive) {
          log('[video] already running — resubscribe complete, new IDR expected');
          return;
        }
        broadwayActive = true;

        const remoteTrack = user.videoTrack;

        // ── Canvas capture — Firefox decodes H.264 via built-in OpenH264 ──────
        // Firefox (Playwright) ships OpenH264 (Cisco) for WebRTC on all platforms
        // including ARM64 — no proprietary codec package needed.

        const FPS        = cfg.fps || 15;
        const QUALITY    = cfg.jpeg_quality || 0.7;
        const minInterval = 1000 / FPS;
        const grabCanvas = document.getElementById('grab');
        const grabCtx    = grabCanvas.getContext('2d');
        let capturedFrames = 0, firstFrameLogged = false, lastSendTs = 0;

        // Let Agora render into our container div.
        const container = document.getElementById('remote-container');
        try {
          await remoteTrack.play(container);
          log('[video] remoteTrack.play() OK');
        } catch (e) {
          log('[video] remoteTrack.play() error: ' + e.message);
        }

        // ── PC finder (used by frame-counter transform AND periodic stats) ─────
        const isPC = (o) => o && typeof o === 'object' &&
          typeof o.getStats === 'function' && typeof o.getReceivers === 'function';
        const findPC = (obj, d) => {
          if (d > 7 || !obj || typeof obj !== 'object') return null;
          if (isPC(obj)) return obj;
          try { for (const k of Object.keys(obj)) {
            try { const v = obj[k];
              if (v && typeof v === 'object' && !Array.isArray(v)) {
                const r = findPC(v, d + 1); if (r) return r; }
            } catch (_) {}
          }} catch (_) {}
          return null;
        };

        // Frame-counter RTCRtpScriptTransform:
        // If [xform] frame#N logs appear → jitter buffer IS assembling H264 frames
        //   from RTP (depacketizer works) but GMP decoder fails → different issue.
        // If NO [xform] frame#N → jitter buffer never assembles frames → depacketizer
        //   bug (sps-pps-idr-in-keyframe or FU-A handling issue in Firefox 128).
        try {
          if (typeof RTCRtpScriptTransform !== 'undefined') {
            const _pc = findPC(rtcClient, 0);
            const _vrecv = _pc && _pc.getReceivers &&
              _pc.getReceivers().find(r => r.track && r.track.kind === 'video');
            if (_vrecv) {
              const _wSrc = `
                self.postMessage('worker-started');
                let xformFired = false;
                setTimeout(() => {
                  if (!xformFired) self.postMessage('xform-event NEVER FIRED after 15s');
                }, 15000);
                let n = 0;
                onrtctransform = ({transformer}) => {
                  xformFired = true;
                  self.postMessage('xform-event fired');
                  const rd = transformer.readable.getReader();
                  const wr = transformer.writable.getWriter();
                  (function pump() {
                    rd.read().then(({done, value}) => {
                      if (done) { self.postMessage('readable done'); return; }
                      n++;
                      if (n <= 5 || n % 60 === 0)
                        self.postMessage('frame#' + n + ' type=' + value.type +
                          ' sz=' + (value.data ? value.data.byteLength : 0));
                      wr.write(value).then(pump);
                    }).catch(e => self.postMessage('xform-err ' + e));
                  })();
                };`;
              const _w = new Worker(URL.createObjectURL(new Blob([_wSrc], {type:'text/javascript'})));
              _w.onmessage = ({data}) => log('[xform] ' + data);
              _vrecv.transform = new RTCRtpScriptTransform(_w);
              log('[xform] frame-counter installed on video receiver');
            } else {
              log('[xform] no video receiver found in PC');
            }
          } else {
            log('[xform] RTCRtpScriptTransform not available in this Firefox');
          }
        } catch (e) {
          log('[xform] setup error: ' + e.message);
        }

        // Wait up to 10 s for Agora's <video> to have decoded dimensions.
        // No dimensions = H.264 not decoding (check chromium-codecs-ffmpeg-extra).
        let videoEl = null;
        for (let i = 0; i < 100; i++) {
          await new Promise(r => setTimeout(r, 100));
          const v = container.querySelector('video');
          if (v && v.videoWidth > 0 && v.videoHeight > 0) { videoEl = v; break; }
        }
        if (videoEl) {
          log('[video] ✓ <video> ready: ' + videoEl.videoWidth + 'x' + videoEl.videoHeight);
        } else {
          log('[video] ✗ no decoded video after 10 s — H.264/GMP not working');
          const v = container.querySelector('video');
          if (v) {
            const tracks = v.srcObject ? v.srcObject.getTracks() : [];
            const trk = tracks[0];
            log('[video-dbg] readyState=' + v.readyState +
                ' paused=' + v.paused +
                ' err=' + (v.error ? v.error.code : 'null') +
                ' srcObj=tracks=' + tracks.length +
                (trk ? (' trk.state=' + trk.readyState + ' trk.muted=' + trk.muted) : ''));
          } else {
            log('[video-dbg] no <video> in container');
          }
        }

        // ── Periodic stats ────────────────────────────────────────────────────
        let statsCount = 0;
        setInterval(async () => {
          statsCount++;
          let raw = {};
          try {
            const pc = findPC(rtcClient, 0);
            if (pc) {
              const report = await pc.getStats();
              // Build codec map (id → {mimeType, payloadType})
              const codecMap = {};
              report.forEach((r) => { if (r.type === 'codec') codecMap[r.id] = r; });

              const videoRx = [];
              report.forEach((r) => {
                if (r.type === 'inbound-rtp' && r.kind === 'video') {
                  videoRx.push(r);
                  raw = {bytes: r.bytesReceived, framesRx: r.framesReceived,
                         framesDec: r.framesDecoded, kf: r.keyFramesDecoded,
                         impl: r.decoderImplementation,
                         pkt: r.packetsReceived,
                         jbe: r.jitterBufferEmittedCount};
                }
              });

              // First interval: dump all fields for every video rx entry
              if (statsCount === 1) {
                videoRx.forEach((r, i) => {
                  const codec = r.codecId && codecMap[r.codecId];
                  const numVals = Object.entries(r)
                    .filter(([,v]) => typeof v === 'number')
                    .map(([k,v]) => k + '=' + v).join(' ');
                  const strVals = Object.entries(r)
                    .filter(([k,v]) => typeof v === 'string' && k !== 'id' && k !== 'type')
                    .map(([k,v]) => k + '=' + v).join(' ');
                  log('[stats-dbg#' + i + '] ssrc=' + r.ssrc +
                    (codec ? ' codec=' + codec.mimeType + ' pt=' + codec.payloadType : '') +
                    ' | ' + numVals);
                  if (strVals) log('[stats-dbg#' + i + '-str] ' + strVals);
                });
                if (videoRx.length === 0) log('[stats-dbg] no inbound-rtp video entries in getStats()');
              }

              // Log all video streams (there may be >1 SSRC)
              videoRx.forEach((r) => {
                const codec = r.codecId && codecMap[r.codecId];
                log('[stats-rx] ssrc=' + r.ssrc +
                  (codec ? ' ' + codec.mimeType + '/pt=' + codec.payloadType : '') +
                  ' bytes=' + r.bytesReceived + ' pkt=' + r.packetsReceived +
                  ' rx=' + (r.framesReceived != null ? r.framesReceived : '?') +
                  ' jbe=' + (r.jitterBufferEmittedCount != null ? r.jitterBufferEmittedCount : '?') +
                  ' dec=' + (r.framesDecoded != null ? r.framesDecoded : '?') +
                  ' kf=' + (r.keyFramesDecoded || 0) +
                  (r.decoderImplementation ? ' impl=' + r.decoderImplementation : ''));
              });
            }
          } catch (_) {}
          log('[stats] cap=' + capturedFrames +
              ' bytes=' + (raw.bytes || 0) +
              ' pkt='   + (raw.pkt   || 0) +
              ' rx='    + (raw.framesRx  != null ? raw.framesRx  : '?') +
              ' jbe='   + (raw.jbe   != null ? raw.jbe   : '?') +
              ' dec='   + (raw.framesDec != null ? raw.framesDec : '?') +
              ' kf='    + (raw.kf || 0) +
              (raw.impl ? ' impl=' + raw.impl : ''));
        }, 15000);

        // ── Canvas capture loop ───────────────────────────────────────────────
        const tick = () => {
          if (!videoEl || videoEl.videoWidth === 0)
            videoEl = container.querySelector('video') || null;

          if (videoEl && videoEl.videoWidth > 0 && videoEl.videoHeight > 0) {
            const w = videoEl.videoWidth, h = videoEl.videoHeight;
            if (grabCanvas.width  !== w) grabCanvas.width  = w;
            if (grabCanvas.height !== h) grabCanvas.height = h;
            grabCtx.drawImage(videoEl, 0, 0);
            capturedFrames++;
            if (!firstFrameLogged) {
              firstFrameLogged = true;
              log('[video] ✓ FIRST CAPTURE — ' + w + 'x' + h);
            }
            if (ws.readyState === 1) {
              const now = Date.now();
              if (now - lastSendTs >= minInterval) {
                lastSendTs = now;
                grabCanvas.toBlob((blob) => {
                  if (!blob) return;
                  blob.arrayBuffer().then((buf) => {
                    if (ws.readyState === 1) ws.send(buf);
                  });
                }, 'image/jpeg', QUALITY);
              }
            }
          }
          setTimeout(tick, minInterval);
        };
        tick();
      });

      rtcClient.on('user-unpublished', (user, mediaType) => {
        log('user-unpublished uid=' + user.uid + ' ' + mediaType);
      });
      rtcClient.on('user-left', (user, reason) => log('user-left uid=' + user.uid + ' ' + reason));

      const rtcUid = await rtcClient.join(
        cfg.app_id, cfg.channel, cfg.token,
        cfg.user_id ? parseInt(cfg.user_id, 10) : null
      );
      log('RTC joined channel=' + cfg.channel + ' as uid=' + rtcUid);

      // 3) Login to Agora RTM and send the trigger packet to the robot.
      //
      // Without this, the robot stays silent in the channel — it waits for the
      // app to "say hello" via RTM peer message. The production app sends
      // CMD_CONTROL=100900 with subcmd=500 ("ask version") on kvsLoadSuccess
      // (ControlRemoteNewActivity.kvsLoadSuccess → sendAskVersionCommand →
      //  CommDataFactory.sendControlCommandRemote(500, ...)).  Sending the same
      // packet from here also makes the robot start publishing.
      if (!cfg.rtm_token || !cfg.rtm_uid_app || !cfg.rtm_uid_loona) {
        log('[!] RTM credentials missing — robot likely will not publish');
      } else {
        const rtmClient = AgoraRTM.createInstance(cfg.app_id);
        rtmClient.on('ConnectionStateChanged', (state, reason) => {
          if (state === 'DISCONNECTED' || state === 'ABORTED')
            log('RTM ' + state + ' reason=' + reason);
        });

        rtmClient.on('MessageFromPeer', (msg, peerId) => {
          const raw = msg && msg.rawMessage;
          if (raw) {
            const u8 = raw instanceof Uint8Array ? raw : new Uint8Array(raw);
            let cmd = -1;
            if (u8.length >= 8) cmd = new DataView(u8.buffer, u8.byteOffset, u8.byteLength).getInt32(4, true);
            log('RTM<- cmd=' + cmd + ' bytes=' + u8.length);
            if (ws.readyState === 1) {
              try {
                ws.send(JSON.stringify({type: 'rtm', peer: peerId, cmd, bytes: Array.from(u8)}));
              } catch (e) {}
            }
          }
        });

        try {
          await rtmClient.login({uid: cfg.rtm_uid_app, token: cfg.rtm_token});
          log('RTM logged in as ' + cfg.rtm_uid_app);
        } catch (e) {
          log('[!] RTM login failed: ' + (e && (e.message || JSON.stringify(e))));
          throw e;
        }

        const CMD_CONTROL  = 100900;
        const SUBCMD_ASKVER = 500;
        const askVer = makePacket(CMD_CONTROL, int32LE(SUBCMD_ASKVER));
        try {
          await rtmClient.sendMessageToPeer(
            { rawMessage: askVer, description: 'askVersion' },
            cfg.rtm_uid_loona
          );
          log('RTM askVersion sent');
        } catch (e) {
          log('[!] RTM sendMessageToPeer failed: ' + (e && (e.message || JSON.stringify(e))));
        }

        // Stash for later (Python may want to send commands too via window.rtmSend()).
        window.rtmSend = async (cmdCode, bodyBytes) => {
          const pkt = makePacket(cmdCode, bodyBytes);
          await rtmClient.sendMessageToPeer({ rawMessage: pkt }, cfg.rtm_uid_loona);
        };
      }

      // Keep alive forever; bridge.js closes the browser on SIGTERM/SIGINT.
      return rtcUid;
    };

    // Manual-mode auto-start: if URL has #cfg=BASE64(JSON), parse and run.
    if (location.hash && location.hash.startsWith('#cfg=')) {
      try {
        const cfgJson = atob(decodeURIComponent(location.hash.slice('#cfg='.length)));
        const cfg     = JSON.parse(cfgJson);
        // Wait for SDKs (loaded by document.write above) to be ready.
        const waitSdks = () => new Promise((resolve, reject) => {
          let tries = 0;
          const t = setInterval(() => {
            if (typeof AgoraRTC !== 'undefined' && typeof AgoraRTM !== 'undefined') {
              clearInterval(t); resolve();
            } else if (++tries > 40) {
              clearInterval(t); reject(new Error('SDKs did not load in time'));
            }
          }, 100);
        });
        waitSdks()
          .then(() => window.startAgora(cfg))
          .catch(err => log('[!] manual-start error: ' + err.message));
      } catch (e) {
        document.body.insertAdjacentHTML('beforeend',
          '<pre style="color:#f55">cfg parse error: ' + e.message + '</pre>');
      }
    }
  </script>
</body>
</html>
